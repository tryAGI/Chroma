openapi: '3.2.0'
info:
  title: chroma-frontend
  description: ''
  license:
    name: ''
  version: 1.0.0
paths:
  /api/v2/auth/identity:
    get:
      tags:
        - Authentication
      summary: Get user identity
      description: 'Returns the current user''s identity, tenant, and databases.'
      operationId: get_user_identity
      responses:
        '200':
          description: User identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserIdentityResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
  '/api/v2/collections/{crn}':
    get:
      tags:
        - Collection
      summary: Get collection by CRN
      description: Returns a collection by Chroma Resource Name.
      operationId: get_collection_by_crn
      parameters:
        - name: crn
          in: path
          description: Chroma Resource Name
          required: true
          schema:
            type: string
          example: my_tenant:my_database:my_collection
      responses:
        '200':
          description: Collection found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-hidden: true
      x-codeSamples:
        - label: Get collection by CRN
          lang: typescript
          source: const collection = await client.getCollectionByCrn('my_tenant:my_database:my_collection');
        - label: Get collection by CRN
          lang: python
          source: collection = client.get_collection_by_crn('my_tenant:my_database:my_collection')
  /api/v2/healthcheck:
    get:
      tags:
        - System
      summary: Healthcheck
      description: Returns the health status of the service.
      operationId: healthcheck
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: string
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-codeSamples: [ ]
  /api/v2/heartbeat:
    get:
      tags:
        - System
      summary: Heartbeat
      description: Returns a nanosecond timestamp of the current time.
      operationId: heartbeat
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeartbeatResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-codeSamples:
        - label: Heartbeat
          lang: typescript
          source: const timestamp = await client.heartbeat();
        - label: Heartbeat
          lang: python
          source: timestamp = client.heartbeat()
        - label: Heartbeat
          lang: rust
          source: let timestamp = client.heartbeat().await?;
  /api/v2/pre-flight-checks:
    get:
      tags:
        - System
      summary: Pre-flight checks
      description: Returns basic readiness information.
      operationId: pre_flight_checks
      responses:
        '200':
          description: Pre flight checks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/reset:
    post:
      tags:
        - System
      summary: Reset database
      description: Resets the database. Requires authorization.
      operationId: reset
      responses:
        '200':
          description: Reset successful
          content:
            text/plain:
              schema:
                type: boolean
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-hidden: true
  /api/v2/tenants:
    post:
      tags:
        - Tenant
      summary: Create tenant
      description: Creates a new tenant.
      operationId: create_tenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantPayload'
        required: true
      responses:
        '200':
          description: Tenant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTenantResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
  '/api/v2/tenants/{tenant_name}':
    get:
      tags:
        - Tenant
      summary: Get tenant
      description: Returns an existing tenant by name.
      operationId: get_tenant
      parameters:
        - name: tenant_name
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTenantResponse'
              example:
                name: 1e30d217-3d78-4f8c-b244-79381dc6a254
                resource_name: null
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
    patch:
      tags:
        - Tenant
      summary: Update tenant
      description: Updates an existing tenant by name.
      operationId: update_tenant
      parameters:
        - name: tenant_name
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantPayload'
        required: true
      responses:
        '200':
          description: Tenant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTenantResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Tenant resource name already set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
  '/api/v2/tenants/{tenant}/databases':
    get:
      tags:
        - Database
      summary: List databases
      description: Lists all databases for a tenant.
      operationId: list_databases
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: limit
          in: query
          description: Limit for pagination
          schema:
            minimum: 1
            type: integer
            format: int32
          example: 10
        - name: offset
          in: query
          description: Offset for pagination
          schema:
            minimum: 0
            type: integer
            format: int32
          example: 0
      responses:
        '200':
          description: List of databases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vec'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: List Databases
          lang: terminal
          source: chroma db list
    post:
      tags:
        - Database
      summary: Create database
      description: Creates a new database for a tenant.
      operationId: create_database
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatabasePayload'
        required: true
      responses:
        '200':
          description: Database created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDatabaseResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: Create Database
          lang: terminal
          source: chroma db create my-new-db
  '/api/v2/tenants/{tenant}/databases/{database}':
    get:
      tags:
        - Database
      summary: Get database
      description: Returns a database by name.
      operationId: get_database
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Database not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
    delete:
      tags:
        - Database
      summary: Delete database
      description: Deletes a database by name.
      operationId: delete_database
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteDatabaseResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Database not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: Delete Database
          lang: terminal
          source: chroma db delete my-db
  '/api/v2/tenants/{tenant}/databases/{database}/collections':
    get:
      tags:
        - Collection
      summary: List collections
      description: Lists all collections in a database.
      operationId: list_collections
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
        - name: limit
          in: query
          description: Limit for pagination
          schema:
            minimum: 1
            type: integer
            format: int32
          example: 10
        - name: offset
          in: query
          description: Offset for pagination
          schema:
            minimum: 0
            type: integer
            format: int32
          example: 0
      responses:
        '200':
          description: List of collections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vec'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: List collections
          lang: typescript
          source: 'const collections = await client.listCollections({ limit: 10, offset: 0 });'
        - label: List collections
          lang: python
          source: collections = client.list_collections()
        - label: List collections
          lang: rust
          source: 'let collections = client.list_collections(10, Some(0)).await?;'
    post:
      tags:
        - Collection
      summary: Create collection
      description: Creates a new collection in a database.
      operationId: create_collection
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
      requestBody:
        description: Collection creation payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionPayload'
            example:
              configuration: null
              get_or_create: false
              metadata:
                key: value
              name: my_collection
              schema: null
        required: true
      responses:
        '200':
          description: Collection created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: Create collection
          lang: typescript
          source: 'const collection = await client.createCollection({ name: ''my_collection'' });'
        - label: Create collection
          lang: python
          source: collection = client.create_collection(name='my_collection')
        - label: Create collection
          lang: rust
          source: 'let collection = client.get_or_create_collection("my_collection", None).await?;'
  '/api/v2/tenants/{tenant}/databases/{database}/collections/{collection_id}':
    get:
      tags:
        - Collection
      summary: Get collection
      description: Returns a collection by ID or name.
      operationId: get_collection
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
        - name: collection_id
          in: path
          description: Collection UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
      responses:
        '200':
          description: Collection found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: Get collection
          lang: typescript
          source: 'const collection = await client.getCollection({ name: ''my_collection'' });'
        - label: Get collection
          lang: python
          source: collection = client.get_collection(name='my_collection')
        - label: Get collection
          lang: rust
          source: let collection = client.get_collection("my_collection").await?;
    put:
      tags:
        - Collection
      summary: Update collection
      description: Updates an existing collection's name or metadata.
      operationId: update_collection
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
        - name: collection_id
          in: path
          description: Collection UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
      requestBody:
        description: Collection update payload
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollectionPayload'
            example:
              new_configuration: null
              new_metadata:
                key: value
              new_name: updated_collection_name
        required: true
      responses:
        '200':
          description: Collection updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCollectionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: Update collection
          lang: typescript
          source: 'await collection.modify({ name: ''new_name'', metadata: { key: ''value'' } });'
        - label: Update collection
          lang: python
          source: 'collection.modify(name=''new_name'', metadata={''key'': ''value''})'
        - label: Update collection
          lang: rust
          source: "use chroma_types::Metadata;\nlet mut metadata = Metadata::new();\nmetadata.insert(\"key\".to_string(), \"value\".into());\ncollection.modify(Some(\"new_name\"), Some(metadata)).await?;"
    delete:
      tags:
        - Collection
      summary: Delete collection
      description: Deletes a collection in a database.
      operationId: delete_collection
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
        - name: collection_id
          in: path
          description: Collection UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
      responses:
        '200':
          description: Collection deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCollectionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Collection not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: Delete collection
          lang: typescript
          source: 'await client.deleteCollection({ name: ''my_collection'' });'
        - label: Delete collection
          lang: python
          source: client.delete_collection(name='my_collection')
        - label: Delete collection
          lang: rust
          source: client.delete_collection("my_collection").await?;
  '/api/v2/tenants/{tenant}/databases/{database}/collections/{collection_id}/add':
    post:
      tags:
        - Record
      summary: Add records
      description: Adds records to a collection.
      operationId: collection_add
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
        - name: collection_id
          in: path
          description: Collection UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCollectionRecordsPayload'
        required: true
      responses:
        '201':
          description: Collection added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddCollectionRecordsResponse'
        '400':
          description: Invalid data for collection addition
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: Add records
          lang: typescript
          source: 'await collection.add({ ids: [''id1'', ''id2''], embeddings: [[0.1, 0.2], [0.3, 0.4]], documents: [''doc1'', ''doc2''] });'
        - label: Add records
          lang: python
          source: 'collection.add(ids=[''id1'', ''id2''], embeddings=[[0.1, 0.2], [0.3, 0.4]], documents=[''doc1'', ''doc2''])'
        - label: Add records
          lang: rust
          source: "collection.add(\n    vec![\"id1\".to_string(), \"id2\".to_string()],\n    vec![vec![0.1, 0.2], vec![0.3, 0.4]],\n    Some(vec![Some(\"doc1\".to_string()), Some(\"doc2\".to_string())]),\n    None,\n    None\n).await?;"
  '/api/v2/tenants/{tenant}/databases/{database}/collections/{collection_id}/attached_functions/{name}/detach':
    post:
      tags:
        - Function
      summary: Detach function
      description: Detaches a function from a collection.
      operationId: detach_function
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
        - name: collection_id
          in: path
          description: Collection UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: name
          in: path
          description: Function name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetachFunctionRequest'
        required: true
      responses:
        '200':
          description: Function detached successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetachFunctionResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
  '/api/v2/tenants/{tenant}/databases/{database}/collections/{collection_id}/count':
    get:
      tags:
        - Record
      summary: Get number of records
      description: Returns the number of records in a collection.
      operationId: collection_count
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
