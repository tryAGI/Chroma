          source: 'collection.upsert(ids=[''id1'', ''id2''], embeddings=[[0.1, 0.2], [0.3, 0.4]], documents=[''doc1'', ''doc2''])'
        - label: Upsert records
          lang: rust
          source: "collection.upsert(\n    vec![\"id1\".to_string(), \"id2\".to_string()],\n    vec![vec![0.1, 0.2], vec![0.3, 0.4]],\n    Some(vec![Some(\"doc1\".to_string()), Some(\"doc2\".to_string())]),\n    None,\n    None\n).await?;"
  '/api/v2/tenants/{tenant}/databases/{database}/collections_count':
    get:
      tags:
        - Collection
      summary: Get number of collections
      description: Returns the total number of collections in a database.
      operationId: count_collections
      parameters:
        - name: tenant
          in: path
          description: Tenant UUID
          required: true
          schema:
            type: string
          example: 1e30d217-3d78-4f8c-b244-79381dc6a254
        - name: database
          in: path
          description: Database name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Count of collections
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/u32'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKeyAuth: [ ]
      x-codeSamples:
        - label: Count collections
          lang: typescript
          source: 'const count: number = await client.countCollections();'
        - label: Count collections
          lang: python
          source: count = client.count_collections()
        - label: Count collections
          lang: rust
          source: let count = client.count_collections().await?;
  /api/v2/version:
    get:
      tags:
        - System
      summary: Get version
      description: Returns the version of the server.
      operationId: version
      responses:
        '200':
          description: Get server version
          content:
            text/plain:
              schema:
                type: string
      x-codeSamples:
        - label: Get version
          lang: typescript
          source: const version = await client.version();
        - label: Get version
          lang: python
          source: version = client.get_version()
components:
  schemas:
    AddCollectionRecordsPayload:
      required:
        - ids
        - embeddings
      type: object
      properties:
        documents:
          type:
            - 'null'
            - array
          items:
            type:
              - 'null'
              - string
        embeddings:
          description: Embeddings for each record. Can contain the raw f32 arrays or base64 encoded strings.
          $ref: '#/components/schemas/EmbeddingsPayload'
        ids:
          type: array
          items:
            type: string
          description: Unique identifiers for each record.
        metadatas:
          type:
            - 'null'
            - array
          items:
            oneOf:
              - type: 'null'
              - $ref: '#/components/schemas/HashMap'
        uris:
          type:
            - 'null'
            - array
          items:
            type:
              - 'null'
              - string
      description: "Payload for adding records to a collection.\n\nRecords are added in batches. All arrays must have the same length, with each index\nrepresenting a single record. For example, `ids[0]`, `embeddings[0]`, `documents[0]`, etc.\nall belong to the same record."
    AddCollectionRecordsResponse:
      type: object
    AttachFunctionRequest:
      required:
        - name
        - function_id
        - output_collection
