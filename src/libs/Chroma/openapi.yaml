        embeddings:
          type:
            - 'null'
            - array
          items:
            type: array
            items:
              type:
                - 'null'
                - array
              items:
                type: number
                format: float
        ids:
          type: array
          items:
            type: array
            items:
              type: string
        include:
          type: array
          items:
            $ref: '#/components/schemas/Include'
        metadatas:
